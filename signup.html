<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-key="page_title"></title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <!-- Header -->
  <header class="navbar">
    <div class="logo">
      <i class="fas fa-seedling fa-2x"></i> <span class="brand-name">Matruka</span>
    </div>
    <button onclick="window.history.back()" class="back-btn">
      <i class="fas fa-arrow-left"></i> <span data-key="go_back"></span>
    </button>

    <!-- Language Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const lang = localStorage.getItem("selectedLanguage") || "en"; 
        applyLanguage(lang);
      });

      function applyLanguage(lang) {
        document.querySelectorAll("[data-key]").forEach(el => {
          el.textContent = translations[lang][el.getAttribute("data-key")];
        });
        document.querySelectorAll("[data-key-placeholder]").forEach(el => {
          const key = el.getAttribute("data-key-placeholder");
          if(translations[lang][key]) el.placeholder = translations[lang][key];
        });
      }
    </script> 
  </header>

  <!-- Signup Form -->
  <section class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-user-plus"></i> <span data-key="create_account"></span></h2>
      <form id="signupForm">
        <div class="form-group">
          <label data-key="full_name_label"></label>
          <input type="text" id="name" data-key-placeholder="full_name_placeholder" required>
        </div>
        <div class="form-group">
          <label data-key="email_label"></label>
          <input type="email" id="email" data-key-placeholder="email_placeholder" required>
        </div>
        <div class="form-group">
          <label data-key="password_label"></label>
          <input type="password" id="password" data-key-placeholder="password_placeholder" required>
        </div>
        <div class="form-group">
          <label data-key="confirm_password_label"></label>
          <input type="password" id="confirm-password" data-key-placeholder="confirm_password_placeholder" required>
        </div>
        <button type="submit" class="btn-primary" data-key="sign_up_btn"></button>
      </form>
      <p class="auth-switch">
        <span data-key="already_account"></span> <a href="login.html" data-key="login_here"></a>
      </p>
    </div>
  </section>

  <script>
    const translations = {
      en: {
        page_title: "Matruka - Sign Up",
        go_back: "Go Back",
        create_account: "Create Account",
        full_name_label: "Full Name",
        full_name_placeholder: "Enter your full name",
        email_label: "Email Address",
        email_placeholder: "Enter your email",
        password_label: "Password",
        password_placeholder: "Create a password",
        confirm_password_label: "Confirm Password",
        confirm_password_placeholder: "Re-enter your password",
        sign_up_btn: "Sign Up",
        already_account: "Already have an account?",
        login_here: "Login here"
      },
     hi: {
        page_title: "मत्रुका - साइन अप",
        go_back: "वापस जाएं",
        create_account: "खाता बनाएँ",
        full_name_label: "पूरा नाम",
        full_name_placeholder: "अपना पूरा नाम दर्ज करें",
        email_label: "ईमेल पता",
        email_placeholder: "अपना ईमेल दर्ज करें",
        password_label: "पासवर्ड",
        password_placeholder: "पासवर्ड बनाएँ",
        confirm_password_label: "पासवर्ड पुष्टि करें",
        confirm_password_placeholder: "पासवर्ड पुनः दर्ज करें",
        sign_up_btn: "साइन अप करें",
        already_account: "पहले से खाता है?",
        login_here: "यहाँ लॉगिन करें"
      }
    };

    function setLanguage(lang) {
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if(translations[lang][key]) el.innerText = translations[lang][key];
      });
      document.querySelectorAll('[data-key-placeholder]').forEach(el => {
        const key = el.getAttribute('data-key-placeholder');
        if(translations[lang][key]) el.placeholder = translations[lang][key];
      });
      localStorage.setItem("selectedLanguage", lang);
    }

    // Default language
    setLanguage(localStorage.getItem("selectedLanguage") || 'en');
  </script>

  <!-- Firebase (compat SDKs) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="signup.js"></script>

</body>
</html>

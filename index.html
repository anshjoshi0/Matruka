        <p id="weather-desc" data-key-placeholder="weather_loading">Loading...</p>
      </div>
    </div>
  <!--language-->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lang = localStorage.getItem("selectedLanguage") || "en"; 
      applyLanguage(lang);
    });
    
    function applyLanguage(lang) {
      document.querySelectorAll("[data-key]").forEach(el => {
        el.textContent = translations[lang][el.getAttribute("data-key")];
      });
    }
  </script>

<script>
  // OpenWeather
  
  function fetchWeather(lat, lon) {
  fetch("/api/weather", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ lat, lon })
  })
   .then(res => res.json())
   .then(data => {
     document.getElementById("weather-temp").textContent = `${Math.round(data.main.temp)} deg C`;
     document.getElementById("weather-desc").textContent = data.weather[0].description;
  
     // Set weather icon
     const icon = document.getElementById("weather-icon");
     const weather = data.weather[0].main.toLowerCase();
     if (weather.includes("cloud")) icon.className = "fas fa-cloud fa-2x";
     else if (weather.includes("rain")) icon.className = "fas fa-cloud-showers-heavy fa-2x";
     else if (weather.includes("clear")) icon.className = "fas fa-sun fa-2x";
     else if (weather.includes("snow")) icon.className = "fas fa-snowflake fa-2x";
     else icon.className = "fas fa-smog fa-2x";
   })
   .catch(err => {
     document.getElementById("weather-desc").textContent = "Unable to fetch";
     console.error("Weather error:", err);
   });
  }
  
  // Get user's location
  if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
   pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
   err => {
     console.error("Location error:", err);
     document.getElementById("weather-desc").textContent = "Location blocked";
   }
  );
  } else {
  document.getElementById("weather-desc").textContent = "No location support";
  }
  </script>
